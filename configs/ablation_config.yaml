# ═══════════════════════════════════════════════════════════════════════════
# Ablation Study Configuration
# AutoViVQA Model Builder — MOE Ablation Pipeline
# Supports both "generative" and "classification" model types.
# ═══════════════════════════════════════════════════════════════════════════

ablation:
  name: "moe_ablation_study"

  # ── Model Type ────────────────────────────────────────────────────────
  # "generative"      → GenerativeVQAModel (encoder-decoder, seq2seq)
  # "classification"  → VQAModel (encoder + answer head)
  model_type: "generative"

  # ── Primary Metric ────────────────────────────────────────────────────
  # "bleu" for generative, "vqa_accuracy" for classification
  primary_metric: "bleu"

  # ── Search Space ──────────────────────────────────────────────────────
  search_space:
    # Expert types to ablate
    expert_types:
      - "vision"
      - "text"
      - "multimodal"
      - "specialized"

    # Which ablation experiments to generate
    run_single_expert: true        # One expert type only (4 experiments)
    run_leave_one_out: true        # Remove one type at a time (4 experiments)
    run_subsets: true              # Subset combinations (6 experiments for pairs, 4 for triples)
    include_no_moe_baseline: true  # No MOE at all (1 experiment)
    include_full_baseline: true    # All experts enabled (1 experiment)

    # Subset limits (controls combinatorial explosion)
    min_subset_size: 2
    max_subset_size: 3

    # Router ablation space
    router_types:
      - "topk"
      - "noisy_topk"
      - "soft"
      - "expert_choice"

    top_k_values: [1, 2, 4]
    load_balance_weights: [0.0, 0.01, 0.1]
    capacity_factors: [1.0, 1.25, 1.5]

    # Cross-product control:
    #   - false: Expert ablation with default router + Router ablation on full baseline
    #   - true:  Every expert config × every router config (large matrix!)
    cross_expert_router: false

    # Default expert counts per type (matches VQAMOELayer defaults)
    num_experts_per_type:
      vision: 2
      text: 2
      multimodal: 2
      specialized: 2

  # ── Training Settings (defaults, can be overridden per experiment) ──
  num_epochs: 10
  learning_rate: 2.0e-5
  batch_size: 8              # Reduced for RTX 3060 (12GB). Effective batch = batch_size × grad_accum = 32
  eval_batch_size: 32
  seed: 42
  use_amp: true
  gradient_accumulation_steps: 4   # Compensates for smaller batch_size (8 × 4 = 32 effective)
  early_stopping: true
  patience: 5

  # ── Data Settings ─────────────────────────────────────────────────────
  images_dir: "data/raw/images"
  text_file: "data/raw/texts/evaluate_60k_data_balanced_preprocessed.csv"
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

  # ── Model Base Settings (shared) ─────────────────────────────────────
  visual_backbone: "vit"
  visual_model_name: "openai/clip-vit-base-patch32"
  text_encoder_type: "phobert"
  text_model_name: "vinai/phobert-base"
  fusion_type: "cross_attention"
  embed_dim: 768
  moe_hidden_dim: 2048

  # ── Generative Model Settings ─────────────────────────────────────────
  # Only used when model_type: "generative"
  num_decoder_layers: 6
  num_attention_heads: 8
  decoder_ff_dim: 2048
  decoder_dropout: 0.1
  max_question_length: 128
  max_answer_length: 64
  freeze_visual_encoder: true
  freeze_question_encoder: true
  label_smoothing: 0.1
  tie_word_embeddings: true

  # ── MOE Configuration ─────────────────────────────────────────────────
  use_moe: true
  moe_type: "vqa"             # 'standard', 'vqa', 'sparse'
  moe_position: "fusion"      # 'fusion', 'decoder', 'both'
  num_experts: 8
  num_experts_per_token: 2
  expert_capacity_factor: 1.25
  moe_loss_weight: 0.01
  num_vision_experts: 1
  num_text_experts: 1
  num_multimodal_experts: 1
  num_specialized_experts: 1
  vietnamese_optimized: true

  # ── Generation Settings (for generative eval) ─────────────────────────
  max_generate_length: 64
  num_beams: 1
  do_sample: false
  temperature: 1.0
  gen_top_k: 50
  gen_top_p: 0.95

  # ── Output Directories ───────────────────────────────────────────────
  output_dir: "outputs/ablation"
  checkpoint_dir: "checkpoints/ablation"
  log_dir: "logs/ablation"

  # ── Execution ─────────────────────────────────────────────────────────
  resume: true           # Skip completed experiments on re-run
  max_parallel: 1        # Sequential execution (1 GPU)

  # ── Explicit Experiments (optional) ───────────────────────────────────
  # Add manually specified experiments here. They're appended to the
  # auto-generated matrix. Useful for testing specific configurations.
  explicit_experiments: []
  # Example:
  #   - experiment_id: "custom_vision_only_soft_router"
  #     expert_config:
  #       mode: "single_expert"
  #       active_experts: ["vision"]
  #     router_config:
  #       router_type: "soft"
  #       top_k: 2
  #       load_balance_weight: 0.05
  #     num_epochs: 15
  #     seed: 42
  #     tags: ["custom"]
